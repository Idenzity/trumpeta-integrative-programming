<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manage Users</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Exo+2:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <header class="header">
      <h1>Admin Panel</h1>
      <nav>
        <a href="admin.html">Dashboard</a>
        <a href="add-user.html">Add User</a>
        <a href="index.html">Logout</a>
      </nav>
    </header>

    <section class="container">
      <h2>Manage Users</h2>

      <h3>Add New User</h3>

      <form id="addUserForm" class="add-user-form">
        <input type="text" id="name" placeholder="Name" required />
        <input type="email" id="email" placeholder="Email" required />
        <input type="text" id="role" placeholder="Role" required />

        <button type="submit">Add User</button>
      </form>

      <table class="manage-table">
        <thead>
          <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>Role</th>
            <th>Action</th>
          </tr>
        </thead>

        <tbody id="userTable">
          <tr>
            <td>1</td>
            <td>Ralph</td>
            <td>ralph@gmail.com</td>
            <td>Admin</td>
            <td><button class="delete-btn">Delete</button></td>
          </tr>

          <tr>
            <td>2</td>
            <td>Steve</td>
            <td>steve@gmail.com</td>
            <td>User</td>
            <td><button class="delete-btn">Delete</button></td>
          </tr>
        </tbody>
      </table>
    </section>
    <script src="script.js"></script>
  </body>
</html>
